# Builds the app's Docker image and deploys it to the Azure Web App "necker-sealy".
# Runs on every push to main (and can be triggered manually from the Actions tab).
# Images are tagged with the commit SHA so every deploy is an exact, immediate swap.
name: Build and deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/bobbynecker/city-of-sealy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy the image to the Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: necker-sealy
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE }}:${{ github.sha }}
